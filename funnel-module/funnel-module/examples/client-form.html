<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Client Funnel Form</title><style>body{font-family:Arial,sans-serif;max-width:520px;margin:40px auto;padding:0 16px}input,button{width:100%;padding:10px;margin:8px 0}.hp{display:none}</style></head><body>
<h1>Get the Welcome Series</h1><form id="funnelForm"><input name="name" placeholder="Your name" required><input type="email" name="email" placeholder="Email address" required><input type="hidden" name="sequence_id" value="1"><input class="hp" name="website" tabindex="-1" autocomplete="off"><button>Subscribe</button></form><p id="message"></p>
<script>
document.getElementById('funnelForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const message = document.getElementById('message');
  const response = await fetch('/funnel-module/public/subscribe.php', { method: 'POST', body: new FormData(event.target) });
  const data = await response.json();
  message.textContent = data.message || (data.success ? 'Subscribed.' : 'Something went wrong.');
  message.style.color = data.success ? 'green' : 'crimson';
});
</script></body></html>
